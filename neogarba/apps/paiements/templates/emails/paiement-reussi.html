<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation de Paiement</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            margin: 0;
            padding: 40px 20px;
        }
        .card {
            max-width: 550px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            font-size: 40px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 16px 0;
            color: #ffffff;
            letter-spacing: -0.025em;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #9ca3af;
            margin: 0 0 24px 0;
        }
        .highlight {
            font-weight: 600;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 6px;
        }
        .footer {
            margin-top: 32px;
            font-size: 13px;
            color: #6b7280;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>Paiement Confirmé !</h1>
        <p>
            Votre paiement de <span class="highlight">{{ paiement.montant }} FCFA</span> par <span class="highlight">{{ paiement.moyen }}</span> a ete confirme.<br>
            Commande <span class="highlight">{{ commande.reference }}</span>.
        </p>
        <div class="footer">
            &copy; 2026 NeoGarba. Tous droits réservés.
        </div>
    </div>
</body>
</html>
